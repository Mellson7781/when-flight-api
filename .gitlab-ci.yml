stages:
  - build
  - deploy

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind

  variables:
    DOCKER_TLS_CERTDIR: ""

  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY

  script:
    - docker build --pull -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:latest

  only:
    - main


deploy:
  stage: deploy
  image: alpine:latest

  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

  script:
    - ssh $SSH_USER@$SSH_HOST "cd /path/to/app && git pull && npm install && npm run build"

  only:
    - main